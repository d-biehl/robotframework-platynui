name: CI

on:
  push:
    branches: [main, new_core]
    tags: ["v*"]
  pull_request:
    branches: [main, new_core]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build, test, and lint (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libfontconfig-dev \
            clang \
            libasound2-dev \
            pkg-config \
            libssl-dev \
            libudev-dev \
            libseat-dev \
            libinput-dev \
            libgbm-dev

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Install tools (nextest, just)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: Bootstrap environment
        run: just bootstrap

      - name: Check Rust formatting
        run: just fmt-check

      - name: Lint Rust (clippy)
        run: just clippy

      - name: Build Rust workspace
        run: just build

      - name: Run Rust tests
        run: just test

      - name: Clean Rust build artifacts
        run: cargo clean

      - name: Lint Python (ruff)
        run: just ruff

      - name: Type-check Python (mypy)
        run: just mypy

      - name: Run Python tests
        run: just test-python

  # ── Linux manylinux wheels (container-based) ──────────────────────────────────

  build-wheels:
    name: Build wheels
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Update versions from git
        run: uv run scripts/update-git-versions.py

      - name: Update changelog
        run: uv run scripts/update-changelog.py

      - name: Bootstrap environment
        run: just bootstrap

      - name: Build PlatynUI pure-Python wheel
        run: just build-platynui-wheel

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-linux:
    name: Build wheels (Linux ${{ matrix.target }})
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: 2_34
            container: quay.io/pypa/manylinux_2_34_x86_64:latest
            setup-qemu: false
          - target: aarch64
            manylinux: 2_34
            container: quay.io/pypa/manylinux_2_34_aarch64:latest
            setup-qemu: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.setup-qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Update versions from git
        run: uv run scripts/update-git-versions.py

      - name: Update changelog
        run: uv run scripts/update-changelog.py

      - name: Bootstrap environment
        run: just bootstrap

      - name: Build native wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: ${{ matrix.container }}
          args: --release -m packages/native/Cargo.toml -o dist
          before-script-linux: |
            yum install -y libxkbcommon-devel

      - name: Build CLI wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: ${{ matrix.container }}
          args: --release -m packages/cli/Cargo.toml -o dist
          before-script-linux: |
            yum install -y libxkbcommon-devel

      - name: Build Inspector wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: ${{ matrix.container }}
          args: --release -m packages/inspector/Cargo.toml -o dist
          before-script-linux: |
            yum install -y libxkbcommon-devel

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # ── macOS / Windows wheels ─────────────────────────────────────────────────────

  build-wheels-macos-windows:
    name: Build wheels (${{ matrix.os }})
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, windows-11-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Add Rust tool bin directories to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cargoBin = Join-Path $env:USERPROFILE '.cargo\bin'
          if (Test-Path $cargoBin) {
            $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Update versions from git
        run: uv run scripts/update-git-versions.py

      - name: Update changelog
        run: uv run scripts/update-changelog.py

      - name: Bootstrap environment
        run: just bootstrap

      - name: Build native wheel (platynui-native)
        run: just build-native-wheel

      - name: Build CLI wheel (platynui-cli)
        run: just build-cli-wheel

      - name: Build Inspector wheel (platynui-inspector)
        run: just build-inspector-wheel

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error
