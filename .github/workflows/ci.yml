name: CI

on:
  push:
    branches: [main, new_core]
    tags: ["v*"]
  pull_request:
    branches: [main, new_core]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build, test, and lint (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libfontconfig-dev \
            clang \
            libasound2-dev \
            pkg-config \
            libssl-dev \
            libudev-dev \
            libseat-dev \
            libinput-dev \
            libgbm-dev 

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (Rust)
        run: cargo build --all --all-targets

      - name: Test (Rust - nextest)
        run: cargo nextest run --workspace --no-fail-fast

      - name: Clean rust build artifacts
        run: cargo clean

      - name: sync Python environment (uv)
        run: uv sync --dev --all-packages --all-groups

      - name: build runtime with maturin (via uv)
        run: uv run maturin develop -m packages/native/Cargo.toml --features mock-provider --uv

      - name: Python lint (ruff)
        run: uv run ruff check

      - name: Python type check (mypy) [optional]
        run: uv run mypy .

      - name: Python tests (pytest)
        run: uv run --no-sync pytest -v --tb=short --maxfail=5

  # ── Linux manylinux wheels (container-based) ──────────────────────────────────

  build-wheels-linux:
    name: Build wheels (Linux ${{ matrix.target }})
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64]
        # Add aarch64 when cross-compilation is needed:
        # target: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: update versions from git
        run: uv run scripts/update-git-versions.py

      - name: update changelog
        run: uv run scripts/update-changelog.py

      - name: Build native wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: 2_28
          args: --release -m packages/native/Cargo.toml -o dist
          before-script-linux: |
            yum install -y libxkbcommon-devel libxcb-devel fontconfig-devel \
              alsa-lib-devel openssl-devel systemd-devel libinput-devel \
              mesa-libgbm-devel libseat-devel clang pkg-config

      - name: Build CLI wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: 2_28
          args: --release -m packages/cli/Cargo.toml -o dist
          before-script-linux: |
            yum install -y libxkbcommon-devel libxcb-devel fontconfig-devel \
              alsa-lib-devel openssl-devel systemd-devel libinput-devel \
              mesa-libgbm-devel libseat-devel clang pkg-config

      - name: Build Inspector wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: 2_28
          args: --release -m packages/inspector/Cargo.toml -o dist
          before-script-linux: |
            yum install -y libxkbcommon-devel libxcb-devel fontconfig-devel \
              alsa-lib-devel openssl-devel systemd-devel libinput-devel \
              mesa-libgbm-devel libseat-devel clang pkg-config

      - name: Build PlatynUI pure-Python wheel
        run: uv build --wheel -o dist

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # ── macOS / Windows wheels ─────────────────────────────────────────────────────

  build-wheels-host:
    name: Build wheels (${{ matrix.os }})
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: update versions from git
        run: uv run scripts/update-git-versions.py

      - name: update changelog
        run: uv run scripts/update-changelog.py

      - name: Build native wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release -m packages/native/Cargo.toml -o dist

      - name: Build CLI wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release -m packages/cli/Cargo.toml -o dist

      - name: Build Inspector wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release -m packages/inspector/Cargo.toml -o dist

      - name: Build PlatynUI pure-Python wheel
        run: uv build --wheel -o dist

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error
